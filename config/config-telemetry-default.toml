# Example pipeline config for the process-telemetry task.
# Pass this file via: afft tasks process-telemetry SOURCE OUTPUT --config <this file>
#
# Each [[telemetry_processing_pipeline]] entry runs one processor in order.
# The optional [telemetry_processing_pipeline.config] sub-table overrides the
# processor's defaults. Omit it entirely to use all defaults.

[[telemetry_processing_pipeline]]
processor = "pair_stereo_images"
inputs    = ["image_capture"]
output    = "image_capture"

[telemetry_processing_pipeline.config]
left_suffix   = "LC16"
right_suffix  = "RM16"
max_offset_ms = 300.0

[[telemetry_processing_pipeline]]
processor = "estimate_pressure_uncertainty"
inputs    = ["pressure_parosci"]
output    = "pressure_parosci"

[telemetry_processing_pipeline.config]
base_uncertainty = 0.1
depth_scale      = 0.0

[[telemetry_processing_pipeline]]
processor = "estimate_dvl_uncertainty"
inputs    = ["teledyne_dvl"]
output    = "teledyne_dvl"

[telemetry_processing_pipeline.config]
velocity_x_uncertainty = 0.003
velocity_y_uncertainty = 0.003
velocity_z_uncertainty = 0.003
roll_uncertainty       = 0.50
pitch_uncertainty      = 0.50
heading_uncertainty    = 2.00

# resolve_usbl_position must run before estimate_usbl_uncertainty
# so that horizontal_range is available.
[[telemetry_processing_pipeline]]
processor = "resolve_usbl_position"
inputs    = ["lqmodem", "pressure_parosci"]
output    = "lqmodem"

[telemetry_processing_pipeline.config]
bearing_reference = "relative"

[[telemetry_processing_pipeline]]
processor = "estimate_usbl_uncertainty"
inputs    = ["lqmodem"]
output    = "lqmodem"

[telemetry_processing_pipeline.config]
range_uncertainty   = 15.0
bearing_uncertainty = 20.05
